CONFIG_MTD=y
CONFIG_MTD_CMDLINE_PARTS=y
# Parse the fixed-partitions (incl. the rootfs `slc-mode;` flag) straight
# from the device tree. Without this only cmdline mtdparts= works, and the
# DT partitions are silently ignored -> the whole chip shows up as one mtd.
CONFIG_MTD_OF_PARTS=y
CONFIG_MTD_RAW_NAND=y
CONFIG_MTD_NAND_SUNXI=y
CONFIG_MTD_UBI=y
CONFIG_MISC_FILESYSTEMS=y
CONFIG_UBIFS_FS=y

# AXP209 PMIC USB power-supply chain, BUILT-IN, so the module-less FEL installer
# initramfs can bring up usb0. The OTG phy (phy-sun4i-usb) waits on the AXP209
# `usb-power` supply node (DT: /soc/i2c@1c2ac00/pmic@34/usb-power), driven by
# axp20x_usb_power (AXP20X_POWER), which reads VBUS via the AXP20X IIO ADC. armmp
# already builds in the i2c bus + axp20x mfd + regulator (=y), but ships the
# power-supply + ADC + IIO core as MODULES -> in the installer initramfs the
# supply never registers -> the (built-in) phy defers forever -> "WARN: usb0 not
# present" / "dnsmasq: unknown interface usb0". Forcing these =y closes the gap.
# (The i2c/mfd/regulator lines are kept as defensive pins in case armmp changes.)
CONFIG_I2C=y
CONFIG_I2C_MV64XXX=y
CONFIG_MFD_AXP20X=y
CONFIG_MFD_AXP20X_I2C=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_AXP20X=y
CONFIG_IIO=y
CONFIG_AXP20X_ADC=y
CONFIG_AXP20X_POWER=y

# OTG musb (built-in) so the NAND installer initramfs can bring up a USB-network
# gadget. MUST be DUAL_ROLE, not GADGET (peripheral-only): the CHIP dts sets the
# usb_otg node to `dr_mode = "otg"`, and sunxi_musb.c only compiles the
# USB_DR_MODE_OTG case under CONFIG_USB_MUSB_DUAL_ROLE -- with GADGET-only, "otg"
# hits the default branch and probe dies with "Invalid or missing 'dr_mode'
# property" (-EINVAL) -> no usb0. This matches sunxi_defconfig, which got
# dual-role by default from USB=y + USB_GADGET=y. DUAL_ROLE also REQUIRES the USB
# host core built-in (Kconfig: depends on USB=y), so force CONFIG_USB=y too
# (armmp ships it =m). (This regressed when we moved sunxi_defconfig -> armmp.)
CONFIG_USB=y
CONFIG_USB_MUSB_HDRC=y
CONFIG_USB_MUSB_SUNXI=y
CONFIG_USB_MUSB_DUAL_ROLE=y
CONFIG_USB_SUNXI_PHY=y
CONFIG_PHY_SUN4I_USB=y
CONFIG_NOP_USB_XCEIV=y

# Gadget framework + configfs-composed RNDIS (what x-chip-tools/init builds).
CONFIG_USB_GADGET=y
CONFIG_USB_LIBCOMPOSITE=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_RNDIS=y
CONFIG_USB_U_ETHER=y

# DIP display bridges off TCON0's parallel RGB output (chip-dt-overlays applies
# the matching overlay at boot). armmp builds DRM_SUN4I but not these external
# bridges: HDMI DIP = Chrontel CH7033 RGB->HDMI (i2c), VGA DIP = a dumb resistor
# DAC ("dumb-vga-dac"). Modules -- they autoload when the overlay's bridge node
# probes; the display isn't needed at installer time.
CONFIG_DRM_CHRONTEL_CH7033=m
CONFIG_DRM_SIMPLE_BRIDGE=m
