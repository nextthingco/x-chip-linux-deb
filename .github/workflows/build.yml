name: build-kernel-debs

# build chip flavor kernel, kick off x-chip-deb-repo with new artifacts

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the -chip kernel .debs
        run: make

      # all non-dbg debs
      - name: Collect .debs
        run: |
          mkdir -p out
          for f in build/*.deb; do
            case "$f" in *dbg*) continue ;; esac
            cp "$f" out/
          done
          ls -l out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs
          path: out/*.deb
          if-no-files-found: error

  # kick off x-chip-deb-repo
  dispatch:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: nextthingco
          repositories: x-chip-deb-repo

      - name: Trigger x-chip-deb-repo publish
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: nextthingco/x-chip-deb-repo
          event-type: kernel-debs
          client-payload: |
            {"run_id": "${{ github.run_id }}", "repo": "${{ github.repository }}"}
